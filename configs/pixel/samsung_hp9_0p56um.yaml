# @package _global_
#
# Samsung ISOCELL HP9 (2024) — 200 MP, 0.56 µm pixel, 1/1.4" optical format.
# Industry's first 200 MP telephoto sensor for smartphones.
# Reference: Samsung Newsroom (Jun 2024), Samsung Semiconductor product page.
#
# Distinctive structural features modelled here:
# - Pitch = 0.56 µm.
# - Tetra²pixel: 4x4 same-color group (announced as "Hexadeca" / 16-cell binning).
#   The Bayer tile is therefore an 8x8 unit cell with R/G/G/B 4x4 blocks.
# - High-refractive-index microlens ("new material" announced for HP9) — modelled
#   here with `polymer_hri_n1p70` (TiO2-doped polymer, n≈1.70).
# - F-DTI with SiO2 (Samsung GNJ generation upgraded the trench fill from
#   polysilicon to silicon oxide for lower crosstalk).
# - Sub-µm pitches use a thinner color filter (~0.4 µm) and a slightly thinner
#   silicon epi (~2.0 µm) than legacy 1.0 µm pixels.
#
# All numerical values are reasonable defaults inferred from public scaling
# trends; precise process numbers are not disclosed by the vendor and should be
# refined via measured QE/crosstalk fits if available.
pixel:
  pitch: 0.56
  unit_cell: [8, 8]   # 4x4 same-color binning -> 8x8 RGGB super-tile

  layers:
    air:
      thickness: 1.0
      material: "air"

    microlens:
      enabled: true
      height: 0.40
      # One lens per pixel (HP9 uses per-pixel OCL, not OCL sharing).
      sharing: 1
      radius_x: 0.27
      radius_y: 0.27
      material: "polymer_hri_n1p70"   # high-refractive-index microlens
      profile:
        type: "superellipse"
        n: 2.5
        alpha: 1.0
      shift:
        mode: "auto_cra"
        cra_deg: 0.0
      gap: 0.02

    planarization:
      thickness: 0.20
      material: "sio2"

    color_filter:
      thickness: 0.40
      pattern: "tetra2cell"   # 4x4 same-color groups (Hexadeca)
      materials:
        R: "cf_red"
        G: "cf_green"
        B: "cf_blue"
      grid:
        enabled: true
        width: 0.06
        height: 0.40
        material: "tungsten"

    barl:
      layers:
        - thickness: 0.010
          material: "sio2"
        - thickness: 0.025
          material: "hfo2"
        - thickness: 0.015
          material: "sio2"
        - thickness: 0.030
          material: "si3n4"

    silicon:
      thickness: 2.0
      material: "silicon"
      photodiode:
        position: [0.0, 0.0, 0.4]
        size: [0.40, 0.40, 1.4]
      dti:
        enabled: true
        width: 0.07          # F-DTI process-limited trench width
        depth: 2.0           # full-depth
        material: "sio2"     # GNJ-generation oxide-fill DTI

  # Hexadeca / Tetra^2 Bayer: 4x4 same-color groups in 8x8 super-pixel.
  bayer_map:
    - ["R", "R", "R", "R", "G", "G", "G", "G"]
    - ["R", "R", "R", "R", "G", "G", "G", "G"]
    - ["R", "R", "R", "R", "G", "G", "G", "G"]
    - ["R", "R", "R", "R", "G", "G", "G", "G"]
    - ["G", "G", "G", "G", "B", "B", "B", "B"]
    - ["G", "G", "G", "G", "B", "B", "B", "B"]
    - ["G", "G", "G", "G", "B", "B", "B", "B"]
    - ["G", "G", "G", "G", "B", "B", "B", "B"]
