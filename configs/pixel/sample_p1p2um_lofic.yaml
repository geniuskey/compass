# @package _global_
#
# Sample pixel structure: 1.2 µm pitch Quad Bayer with LOFIC HDR
# (Lateral Overflow Integration Capacitor) and 2x2 shared on-chip lens.
# See docs/guide/sample-pixels.md for the inspiration sources and methodology.
#
# Distinctive features modelled here:
# - Pitch = 1.2 µm.
# - Quad Bayer color filter with **2x2 OCL** (Quad PD): one shared microlens
#   per 2x2 same-color group enables 100% PDAF coverage. Modelled with
#   `microlens.sharing: 2`.
# - LOFIC overflow capacitor sits next to the photodiode in the same Si layer;
#   optically this slightly shrinks the PD lateral footprint (we model PD as
#   ~75% of pixel area instead of ~85%). The LOFIC region itself is a
#   metal-oxide stack and is treated as part of the silicon-with-DTI region
#   for the optical simulation.
# - F-DTI between pixels with SiO2 fill.
pixel:
  pitch: 1.2
  unit_cell: [4, 4]

  layers:
    air:
      thickness: 1.0
      material: "air"

    microlens:
      enabled: true
      height: 0.90
      sharing: 2                 # 2x2 OCL = Quad PD
      material: "polymer_n1p56"
      profile:
        type: "superellipse"
        n: 2.5
        alpha: 1.0
      shift:
        mode: "auto_cra"
        cra_deg: 0.0
      gap: 0.04

    planarization:
      thickness: 0.30
      material: "sio2"

    color_filter:
      thickness: 0.60
      pattern: "tetracell"
      materials:
        R: "cf_red"
        G: "cf_green"
        B: "cf_blue"
      grid:
        enabled: true
        width: 0.07
        height: 0.60
        material: "tungsten"

    barl:
      layers:
        - thickness: 0.010
          material: "sio2"
        - thickness: 0.025
          material: "hfo2"
        - thickness: 0.015
          material: "sio2"
        - thickness: 0.030
          material: "si3n4"

    silicon:
      thickness: 3.0
      material: "silicon"
      photodiode:
        # PD slightly smaller than full pixel because the LOFIC capacitor
        # consumes part of the in-pixel silicon real-estate.
        position: [0.0, 0.0, 0.5]
        size: [0.78, 0.78, 2.0]
      dti:
        enabled: true
        width: 0.08
        depth: 3.0
        material: "sio2"

  bayer_map:
    - ["R", "R", "G", "G"]
    - ["R", "R", "G", "G"]
    - ["G", "G", "B", "B"]
    - ["G", "G", "B", "B"]
